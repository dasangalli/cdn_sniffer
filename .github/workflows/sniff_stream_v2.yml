name: Sniff stream CDN with Performance - V2

on:
  workflow_dispatch:
    inputs:
      stream_id:
        description: 'ID dello stream (es: 1)'
        required: true
        default: '1'
      url:
        description: 'URL della pagina sorgente'
        required: true
      sniff_timeout:
        description: 'Secondi di attesa per ogni job'
        default: '15'

jobs:
  # ---------------------------------------------------------------------------
  # Job paralleli: Sniffing e Benchmark MTR
  # ---------------------------------------------------------------------------
  sniff:
    name: Sniff & Bench Job ${{ matrix.job_index }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job_index: [1, 2, 3, 4, 5, 6] # Numero di runner paralleli

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mtr-tiny

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install playwright requests pytz
          playwright install chromium
          playwright install-deps chromium

      - name: Sniff and Performance Test
        run: |
          # FIX: sudo env "PATH=$PATH" permette a MTR di usare i raw sockets 
          # mantenendo l'ambiente Python configurato sopra.
          sudo env "PATH=$PATH" python sniffer_to_nginx.py \
            --url "${{ inputs.url }}" \
            --stream-id "${{ inputs.stream_id }}" \
            --sniff-timeout "${{ inputs.sniff_timeout }}" \
            --sniff-only \
            --output "cdn_${{ matrix.job_index }}.json"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: cdn-raw-${{ inputs.stream_id }}-${{ matrix.job_index }}
          path: cdn_${{ matrix.job_index }}.json
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job finale: Merge basato sullo Score di Performance
  # ---------------------------------------------------------------------------
  merge:
    name: Select Best CDN and Generate Conf
    needs: sniff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        # FIX: Installiamo playwright anche qui per permettere l'import di sniffer.py
        run: |
          pip install playwright requests pytz

      - name: Scarica tutti i risultati
        uses: actions/download-artifact@v4
        with:
          pattern: cdn-raw-${{ inputs.stream_id }}-*
          merge-multiple: true
          path: cdn_results/

      - name: Final Merge and Config Generation
        run: |
          python sniffer_to_nginx.py \
            --url "${{ inputs.url }}" \
            --stream-id "${{ inputs.stream_id }}" \
            --merge-dir cdn_results/

      - name: Upload Final Nginx Configs
        uses: actions/upload-artifact@v4
        with:
          name: nginx-final-stream-${{ inputs.stream_id }}
          path: |
            upstream_${{ inputs.stream_id }}.conf
            stream_${{ inputs.stream_id }}.conf
          retention-days: 7
